<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>转转乐</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a12;
      --surface: #12121e;
      --card: #1a1a2e;
      --accent1: #7c3aed;
      --accent2: #a855f7;
      --accent3: #ec4899;
      --gold: #f59e0b;
      --gold-light: #fcd34d;
      --red: #ef4444;
      --red-light: #fca5a5;
      --green: #10b981;
      --green-light: #6ee7b7;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans SC', sans-serif;
      overflow: hidden;
    }

    /* ─── Background particles ─── */
    #canvas-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ─── Main layout ─── */
    #app {
      position: relative;
      z-index: 1;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
    }

    /* ─── Title ─── */
    .title {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 900;
      letter-spacing: 0.12em;
      background: linear-gradient(135deg, var(--accent2), var(--accent3), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      animation: titlePulse 3s ease-in-out infinite;
      user-select: none;
    }

    @keyframes titlePulse {
      0%, 100% { filter: brightness(1); }
      50%       { filter: brightness(1.3); }
    }

    /* ─── Video container ─── */
    #video-wrapper {
      position: relative;
      width: min(80vw, 700px);
      aspect-ratio: 16/9;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(124, 58, 237, 0.35),
                  0 0 120px rgba(168, 85, 247, 0.15),
                  inset 0 0 0 1px rgba(255,255,255,0.08);
      background: #000;
      display: none;
    }

    #video-wrapper.visible {
      display: block;
      animation: fadeIn 0.5s ease;
    }

    #video-wrapper::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 22px;
      background: linear-gradient(135deg, var(--accent1), var(--accent3), var(--gold));
      z-index: -1;
      animation: borderSpin 4s linear infinite;
    }

    @keyframes borderSpin {
      0%   { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    #video-a, #video-b {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    #video-a.active, #video-b.active {
      display: block;
    }

    /* Overlay shimmer while looping */
    .shimmer-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        105deg,
        transparent 40%,
        rgba(255,255,255,0.04) 50%,
        transparent 60%
      );
      background-size: 200% 100%;
      animation: shimmer 2.5s linear infinite;
      pointer-events: none;
      z-index: 2;
      display: none;
    }

    .shimmer-overlay.active {
      display: block;
    }

    @keyframes shimmer {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    /* ─── Status text ─── */
    #status-text {
      font-size: clamp(14px, 2vw, 18px);
      color: var(--text-muted);
      letter-spacing: 0.05em;
      min-height: 24px;
      transition: all 0.4s ease;
    }

    /* ─── Buttons ─── */
    .btn {
      position: relative;
      padding: 18px 56px;
      border: none;
      border-radius: 60px;
      font-family: 'Noto Sans SC', sans-serif;
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 700;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.3s ease, filter 0.3s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    .btn:active {
      transform: scale(0.94) !important;
    }

    /* SPIN button – gold gradient */
    #btn-spin {
      background: linear-gradient(135deg, #f59e0b, #fcd34d, #f59e0b);
      background-size: 200% 200%;
      color: #1c0a00;
      box-shadow: 0 0 30px rgba(245, 158, 11, 0.5),
                  0 8px 32px rgba(0,0,0,0.4);
      animation: btnGoldShift 3s ease infinite, btnBounceIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    #btn-spin:hover {
      transform: scale(1.06);
      box-shadow: 0 0 60px rgba(245, 158, 11, 0.75),
                  0 12px 40px rgba(0,0,0,0.5);
    }

    @keyframes btnGoldShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* STOP button – red pulse */
    #btn-stop {
      background: linear-gradient(135deg, #dc2626, #ef4444, #dc2626);
      background-size: 200% 200%;
      color: #fff;
      box-shadow: 0 0 30px rgba(239, 68, 68, 0.5),
                  0 8px 32px rgba(0,0,0,0.4);
      animation: btnRedPulse 1.2s ease-in-out infinite, btnBounceIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    #btn-stop:hover {
      transform: scale(1.06);
      box-shadow: 0 0 60px rgba(239, 68, 68, 0.8),
                  0 12px 40px rgba(0,0,0,0.5);
    }

    @keyframes btnRedPulse {
      0%, 100% { box-shadow: 0 0 30px rgba(239,68,68,0.5), 0 8px 32px rgba(0,0,0,0.4); }
      50%       { box-shadow: 0 0 60px rgba(239,68,68,0.85), 0 8px 32px rgba(0,0,0,0.4); }
    }

    /* Button enter animation */
    @keyframes btnBounceIn {
      0%   { opacity: 0; transform: scale(0.5); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* hidden */
    .hidden {
      display: none !important;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.97); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ─── Decorative ring ─── */
    .deco-ring {
      position: fixed;
      border-radius: 50%;
      border: 1px solid rgba(168, 85, 247, 0.12);
      animation: ringPulse 6s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    .deco-ring:nth-child(1) { width: 300px; height: 300px; top: -80px; left: -80px; animation-delay: 0s; }
    .deco-ring:nth-child(2) { width: 500px; height: 500px; bottom: -150px; right: -150px; animation-delay: -3s; border-color: rgba(236,72,153,0.1); }

    @keyframes ringPulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50%       { transform: scale(1.08); opacity: 1; }
    }
  </style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<!-- Decorative rings -->
<div class="deco-ring"></div>
<div class="deco-ring"></div>

<div id="app">
  <div class="title">✨ 转转乐 ✨</div>

  <!-- Video player -->
  <div id="video-wrapper">
    <video id="video-a" src="前半部分.mp4" loop playsinline></video>
    <video id="video-b" src="后半部分.mp4" playsinline></video>
    <div class="shimmer-overlay" id="shimmer"></div>
  </div>

  <!-- Status -->
  <div id="status-text"></div>

  <!-- Buttons -->
  <button id="btn-spin" class="btn">🎰 转 一 次</button>
  <button id="btn-stop" class="btn hidden">⏹ 停</button>
</div>

<script>
  /* ──────────────────────────────────────
     Particle canvas background
  ────────────────────────────────────── */
  const canvas = document.getElementById('canvas-bg');
  const ctx = canvas.getContext('2d');
  let W, H, particles;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initParticles() {
    particles = Array.from({ length: 80 }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.8 + 0.4,
      dx: (Math.random() - 0.5) * 0.3,
      dy: (Math.random() - 0.5) * 0.3,
      alpha: Math.random() * 0.5 + 0.1,
      hue: Math.random() * 60 + 260  // purples & pinks
    }));
  }

  function drawParticles() {
    ctx.clearRect(0, 0, W, H);
    for (const p of particles) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${p.hue},80%,70%,${p.alpha})`;
      ctx.fill();
      p.x += p.dx; p.y += p.dy;
      if (p.x < 0) p.x = W;
      if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H;
      if (p.y > H) p.y = 0;
    }
    requestAnimationFrame(drawParticles);
  }

  window.addEventListener('resize', () => { resize(); initParticles(); });
  resize();
  initParticles();
  drawParticles();

  /* ──────────────────────────────────────
     Game state machine
     States: IDLE | SPINNING | STOPPING | DONE
  ────────────────────────────────────── */
  const videoWrapper = document.getElementById('video-wrapper');
  const videoA       = document.getElementById('video-a');       // 前半部分 – loops
  const videoB       = document.getElementById('video-b');       // 后半部分 – plays once
  const shimmer      = document.getElementById('shimmer');
  const statusText   = document.getElementById('status-text');
  const btnSpin      = document.getElementById('btn-spin');
  const btnStop      = document.getElementById('btn-stop');

  /* ── Helpers ── */
  function setStatus(msg) { statusText.textContent = msg; }

  function showVideo(which) {
    videoWrapper.classList.add('visible');
    if (which === 'a') {
      videoB.classList.remove('active'); videoB.pause(); videoB.currentTime = 0;
      videoA.classList.add('active');
      shimmer.classList.add('active');
    } else {
      videoA.classList.remove('active'); videoA.pause();
      shimmer.classList.remove('active');
      videoB.classList.add('active');
    }
  }

  function hideVideos() {
    videoA.classList.remove('active'); videoA.pause(); videoA.currentTime = 0;
    videoB.classList.remove('active'); videoB.pause(); videoB.currentTime = 0;
    shimmer.classList.remove('active');
    videoWrapper.classList.remove('visible');
  }

  /* ── State: IDLE → SPINNING ── */
  function doSpin() {
    btnSpin.classList.add('hidden');
    btnStop.classList.remove('hidden');
    setStatus('🎲 正在旋转中……按「停」来停止');

    showVideo('a');
    videoA.currentTime = 0;
    videoA.play().catch(() => {
      // Autoplay blocked: user gesture already happened so this rarely fires
      setStatus('⚠️ 视频播放失败，请检查文件路径');
    });
  }

  /* ── State: SPINNING → STOPPING ── */
  function doStop() {
    btnStop.classList.add('hidden');
    setStatus('🎬 播放结果中……');

    // Let video-a finish its current playthrough, then switch
    // For immediate feel: pause A & switch right away
    showVideo('b');
    videoB.currentTime = 0;
    videoB.play().catch(() => {
      setStatus('⚠️ 视频播放失败，请检查文件路径');
    });
  }

  /* ── State: STOPPING → DONE ── */
  videoB.addEventListener('ended', () => {
    hideVideos();
    setStatus('🎉 本轮结束！');
    // Update button text for re-spin
    btnSpin.textContent = '🎰 再转一次';
    btnSpin.classList.remove('hidden');

    // Re-trigger bounce animation
    btnSpin.style.animation = 'none';
    btnSpin.offsetHeight; // reflow
    btnSpin.style.animation = '';
  });

  /* ── Button listeners ── */
  btnSpin.addEventListener('click', doSpin);
  btnStop.addEventListener('click', doStop);
</script>
</body>
</html>
